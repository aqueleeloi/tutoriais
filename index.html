<script>
    // CONFIGURAÇÃO FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyANzDE9P75ElkvMjShnNTeVQYeeGvfDqxw",
        authDomain: "creativehub-2117d.firebaseapp.com",
        projectId: "creativehub-2117d",
        storageBucket: "creativehub-2117d.firebasestorage.app",
        messagingSenderId: "139416951818",
        appId: "1:139416951818:web:487083c72843b2e78413f3",
        measurementId: "G-0HPC5W1P96"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const googleProvider = new firebase.auth.GoogleAuthProvider();

    let isLoginMode = true;

    // --- INTERFACE LOGIN ---
    function toggleMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('btn-submit').innerText = isLoginMode ? "Entrar na App" : "Registar Agora";
        document.getElementById('toggle-link').innerText = isLoginMode ? "Criar Conta" : "Fazer Login";
        document.getElementById('toggle-hint').innerText = isLoginMode ? "Primeira vez?" : "Já tens conta?";
        document.getElementById('msg-box').style.display = 'none';
    }

    function showMessage(msg, isError = false) {
        const box = document.getElementById('msg-box');
        box.innerText = msg;
        box.style.display = 'block';
        box.className = isError ? 'msg-error' : 'msg-success';
    }

    // --- RECURSOS SERVIDOR ---
    async function resetPassword() {
        const email = document.getElementById('email').value;
        if (!email) return showMessage("Preenche o teu email do IEFP primeiro.", true);
        try {
            await auth.sendPasswordResetEmail(email);
            showMessage("Se o email existir, enviámos a recuperação (verifica o SPAM).", false);
        } catch (e) { showMessage("Erro ao tentar recuperar a password.", true); }
    }

    // LOGIN COM GOOGLE
    document.getElementById('btn-google').addEventListener('click', async () => {
        try {
            const res = await auth.signInWithPopup(googleProvider);
            const user = res.user;
            const userRef = db.collection('users').doc(user.uid);
            const doc = await userRef.get();
            if (!doc.exists) {
                await userRef.set({ name: user.displayName, email: user.email, role: "Membro", date: new Date().toLocaleDateString(), sessions: 1, status: "Online" });
            } else {
                await userRef.update({ sessions: firebase.firestore.FieldValue.increment(1), status: "Online" });
            }
        } catch (e) { showMessage("Erro no login Google.", true); }
    });

    // LOGIN / REGISTO EMAIL (APENAS IEFP E PASSWORD)
    document.getElementById('auth-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        
        // Bloqueio de segurança: Força o uso do email IEFP no registo
        if (!isLoginMode && !email.toLowerCase().includes('iefp.pt')) {
            showMessage("O registo direto requer um email válido do IEFP (@iefp.pt ou @formacao.iefp.pt).", true);
            return;
        }

        // Criar um nome automático a partir do email (ex: FOR158342@formacao.iefp.pt -> FOR158342)
        const autoName = email.split('@')[0].toUpperCase();
        
        const btn = document.getElementById('btn-submit');
        btn.disabled = true; btn.innerText = "A processar...";

        try {
            if (isLoginMode) {
                // FAZER LOGIN NORMAL (Sem exigir clique no email)
                const res = await auth.signInWithEmailAndPassword(email, password);
                db.collection('users').doc(res.user.uid).update({ sessions: firebase.firestore.FieldValue.increment(1), status: "Online" });
            } else {
                // FAZER REGISTO E ENTRAR LOGO
                const res = await auth.createUserWithEmailAndPassword(email, password);
                
                await db.collection('users').doc(res.user.uid).set({ 
                    name: autoName, 
                    email: email, 
                    role: "Aluno IEFP", 
                    date: new Date().toLocaleDateString(), 
                    sessions: 1, 
                    status: "Online" 
                });
                
                // O Firebase vai automaticamente fazer o login e a App abre.
            }
        } catch (error) { 
            let errorMsg = "Ocorreu um erro.";
            if(error.code === 'auth/email-already-in-use') errorMsg = "Este email já está registado. Tenta fazer Login.";
            if(error.code === 'auth/weak-password') errorMsg = "A password deve ter pelo menos 6 caracteres.";
            if(error.code === 'auth/invalid-credential') errorMsg = "Email ou password incorretos.";
            showMessage(errorMsg, true); 
            btn.disabled = false; btn.innerText = isLoginMode ? "Entrar na App" : "Registar Agora";
        }
    });

    // OBSERVAR SESSÃO (Liberta a entrada se o utilizador estiver autenticado)
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'flex';
            
            try {
                const doc = await db.collection('users').doc(user.uid).get();
                if(doc.exists) {
                    document.getElementById('userDisplayName').innerText = doc.data().name;
                    document.getElementById('userInitials').innerText = doc.data().name.charAt(0).toUpperCase();
                }
            } catch(e) {}
            
            setCategory('SOFTWARE');
        } else {
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('app-screen').style.display = 'none';
        }
    });

    // --- LÓGICA DE TEMAS E VÍDEOS ---
    const themes = {
        'SOFTWARE': { grad: 'linear-gradient(135deg, #00c6ff, #0072ff)' },
        'MARKETING': { grad: 'linear-gradient(135deg, #FF512F, #DD2476)' },
        'INSPIRATION': { grad: 'linear-gradient(135deg, #f2994a, #f2c94c)' },
        'PHOTOPEA': { grad: 'linear-gradient(135deg, #20bf55, #01baef)' },
        'CANVA': { grad: 'linear-gradient(135deg, #7f00ff, #e100ff)' }
    };

    let currentCategory = 'SOFTWARE';
    let currentSubCategory = 'ps';

    function setCategory(catKey) {
        currentCategory = catKey;
        const structure = {
            'SOFTWARE': { title: 'Software Lab', pills: [{id:'ps', label:'Photoshop', icon:'fab fa-adobe'}, {id:'pp', label:'Photopea', icon:'fas fa-leaf'}, {id:'cv', label:'Canva', icon:'fas fa-pen-nib'}] },
            'MARKETING': { title: 'Marketing Toolkit', pills: [{id:'mk', label:'Ferramentas', icon:'fas fa-rocket'}] },
            'INSPIRATION': { title: 'Mindset & Cultura', pills: [{id:'in', label:'Geral', icon:'fas fa-lightbulb'}] }
        };
        currentSubCategory = structure[catKey].pills[0].id;
        document.documentElement.style.setProperty('--active-grad', themes[catKey].grad);
        
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(catKey === 'SOFTWARE' ? 'btn-sw' : catKey === 'MARKETING' ? 'btn-mk' : 'btn-in').classList.add('active');
        document.getElementById('pageTitle').innerText = structure[catKey].title;
        
        document.getElementById('pillsContainer').innerHTML = structure[catKey].pills.map(p => `
            <button class="pill ${currentSubCategory === p.id ? 'active' : ''}" onclick="setSubCategory('${p.id}')">
                <i class="${p.icon}"></i> <span>${p.label}</span>
            </button>`).join('');
        renderVideoGrid();
    }

    function setSubCategory(subId) {
        currentSubCategory = subId;
        const subThemes = { 'pp': 'PHOTOPEA', 'cv': 'CANVA' };
        const themeKey = subThemes[subId] || currentCategory;
        document.documentElement.style.setProperty('--active-grad', themes[themeKey].grad);
        document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
        event.currentTarget.classList.add('active');
        renderVideoGrid();
    }

    function renderVideoGrid() {
        if(typeof tutorialData === 'undefined') return;
        const filtered = tutorialData.filter(item => item.section === currentCategory && item.program === currentSubCategory);
        const grid = document.getElementById('videoGrid');
        grid.innerHTML = filtered.length ? filtered.map(item => `
            <a href="${item.id.includes('http') ? item.id : 'https://www.youtube.com/watch?v='+item.id}" target="_blank" class="video-card">
                <div class="thumb-box"><img src="${item.thumb}"></div>
                <div class="info-box">
                    <span class="v-tag" style="color: var(--active-grad)">${item.tag || 'Novo'}</span>
                    <div class="v-title">${item.title}</div>
                </div>
            </a>`).join('') : '<div style="grid-column:1/-1;text-align:center;padding:50px;color:#333;">Em breve novos conteúdos.</div>';
    }
</script>
