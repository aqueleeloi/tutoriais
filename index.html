<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Intelligence | HUB</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script src="videos.js"></script>

    <style>
        :root {
            --bg: #050505; --sidebar: #090909; --card: #111111;
            --text-main: #ffffff; --text-dim: #888888;
            --border: 1px solid rgba(255, 255, 255, 0.08);
            --grad-brand: linear-gradient(135deg, #00c6ff, #0072ff);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #050505; } ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

        /* =========================================
           ECRÃ DE BLOQUEIO (LOGIN / REGISTO)
           ========================================= */
        #login-screen { 
            position: fixed; inset: 0; background: var(--bg); z-index: 9999; 
            display: flex; align-items: center; justify-content: center;
        }
        .auth-container { background: var(--card); border: var(--border); padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .brand { text-align: center; margin-bottom: 30px; }
        .brand h1 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1.8rem; font-weight: 800; }
        .brand span { background: var(--grad-brand); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .brand p { color: var(--text-dim); font-size: 0.85rem; margin-top: 5px; }

        /* Botão do Google */
        .btn-google { width: 100%; padding: 12px; background: #fff; border: none; border-radius: 10px; color: #000; font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .btn-google:hover { background: #e0e0e0; transform: translateY(-2px); }
        .btn-google img { width: 18px; }

        .divider { display: flex; align-items: center; text-align: center; color: #555; font-size: 0.75rem; text-transform: uppercase; font-weight: 700; margin-bottom: 20px; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #333; }
        .divider:not(:empty)::before { margin-right: .25em; }
        .divider:not(:empty)::after { margin-left: .25em; }

        .input-group { margin-bottom: 20px; position: relative; }
        .input-group label { display: block; font-size: 0.75rem; font-weight: 700; color: #666; text-transform: uppercase; margin-bottom: 8px; }
        .input-group input { width: 100%; background: #050505; border: 1px solid #333; padding: 14px; border-radius: 10px; color: #fff; font-size: 0.9rem; transition: 0.3s; }
        .input-group input:focus { border-color: #00c6ff; box-shadow: 0 0 10px rgba(0, 198, 255, 0.2); }

        .forgot-pw { position: absolute; right: 0; top: 0; font-size: 0.75rem; color: #00c6ff; cursor: pointer; font-weight: 600; background: none; border: none; }
        .forgot-pw:hover { text-decoration: underline; }

        .btn-auth { width: 100%; padding: 15px; background: var(--grad-brand); border: none; border-radius: 10px; color: #fff; font-weight: 800; font-size: 0.9rem; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-auth:hover { filter: brightness(1.2); transform: translateY(-2px); }
        .btn-auth:disabled { opacity: 0.6; cursor: not-allowed; }

        .toggle-text { text-align: center; margin-top: 20px; font-size: 0.85rem; color: #888; }
        .toggle-text a { color: #00c6ff; text-decoration: none; font-weight: 700; cursor: pointer; }
        .toggle-text a:hover { text-decoration: underline; }

        #msg-box { display: none; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 0.85rem; font-weight: 600; text-align: center; }
        .msg-error { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid #ef4444; }
        .msg-success { background: rgba(34, 197, 94, 0.1); color: #22c55e; border: 1px solid #22c55e; }
        .only-register { display: none; }

        /* =========================================
           A APP PRINCIPAL (O HUB)
           ========================================= */
        #app-screen { display: none; width: 100%; height: 100%; }
        
        .sidebar { width: 260px; background: var(--sidebar); border-right: var(--border); display: flex; flex-direction: column; padding: 30px 20px; flex-shrink: 0; }
        .nav-label { font-size: 0.65rem; color: #555; text-transform: uppercase; letter-spacing: 1.5px; margin: 25px 0 10px 15px; font-weight: 800; }
        .nav-btn { width: 100%; background: transparent; border: 1px solid transparent; color: var(--text-dim); text-align: left; padding: 12px 18px; font-size: 0.9rem; font-weight: 600; border-radius: 12px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 12px; margin-bottom: 5px; }
        .nav-btn:hover { color: white; background: rgba(255,255,255,0.03); }
        .nav-btn.active { background: #0a0a0a; color: #fff; border-left: 3px solid #00c6ff; }
        .nav-btn.active i { color: #00c6ff; }

        .main-content { flex-grow: 1; padding: 40px 60px; overflow-y: auto; }
        .page-header { margin-bottom: 40px; display: flex; justify-content: space-between; align-items: center; }
        .page-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 2.2rem; font-weight: 800; color: #fff; }
        
        .user-profile { display: flex; align-items: center; gap: 15px; background: var(--card); padding: 10px 20px; border-radius: 50px; border: var(--border); }
        .user-avatar { width: 35px; height: 35px; border-radius: 50%; background: var(--grad-brand); display: flex; align-items: center; justify-content: center; font-weight: 800; color: #fff; }
        .btn-logout { background: none; border: none; color: #ef4444; cursor: pointer; font-weight: 600; font-size: 0.85rem; margin-left: 10px; }

        .pills-container { display: flex; gap: 10px; margin-bottom: 30px; }
        .pill { background: #111; border: 1px solid #333; color: #666; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .pill.active { background: #fff; color: #000; border-color: #fff; }

        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding-bottom: 50px; }
        .video-card { background: var(--card); border: var(--border); border-radius: 12px; overflow: hidden; transition: 0.3s; cursor: pointer; display: flex; flex-direction: column; text-decoration: none;}
        .video-card:hover { transform: translateY(-5px); border-color: #444; box-shadow: 0 10px 30px rgba(0,0,0,0.5);}
        .thumb-box { width: 100%; aspect-ratio: 16/9; overflow: hidden; position: relative; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
        .video-card:hover .thumb-box img { transform: scale(1.05); }
        .play-icon { position: absolute; top:50%; left:50%; transform:translate(-50%, -50%); background:rgba(0,0,0,0.7); width:50px; height:50px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-size:1.2rem; opacity:0; transition:0.3s; backdrop-filter:blur(5px);}
        .video-card:hover .play-icon { opacity:1; }
        .info-box { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .v-tag { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: #00c6ff; margin-bottom: 8px; letter-spacing: 1px;}
        .v-title { font-weight: 700; font-size: 1rem; color: #fff; line-height: 1.4; margin-bottom: 5px;}
        .v-desc { font-size: 0.8rem; color: #888; line-height: 1.5; }

    </style>
</head>
<body>

    <div id="login-screen">
        <div class="auth-container">
            <div class="brand">
                <h1>Master<span>HUB.</span></h1>
                <p id="form-subtitle">Acesso exclusivo para membros</p>
            </div>

            <div id="msg-box"></div>

            <button type="button" class="btn-google" id="btn-google">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google">
                Entrar com o Google
            </button>

            <div class="divider">ou com email</div>

            <form id="auth-form">
                <div class="input-group only-register">
                    <label>Nome Completo</label>
                    <input type="text" id="name" placeholder="Ex: João Silva">
                </div>
                
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="O seu email" required>
                </div>
                
                <div class="input-group" id="pw-group">
                    <label>Password</label>
                    <button type="button" class="forgot-pw" id="btn-forgot" onclick="resetPassword()">Esqueceu a password?</button>
                    <input type="password" id="password" placeholder="Mínimo 6 caracteres" required>
                </div>

                <button type="submit" class="btn-auth" id="btn-submit">Entrar na App</button>
            </form>

            <div class="toggle-text">
                <span id="toggle-hint">Não tem conta?</span> 
                <a onclick="toggleMode()" id="toggle-link">Criar Conta</a>
            </div>
        </div>
    </div>

    <div id="app-screen">
        <aside class="sidebar">
            <div class="brand" style="text-align:left; margin-bottom:40px; margin-top:10px;">
                <h1 style="font-size:1.5rem;">Master<span>HUB.</span></h1>
            </div>
            
            <div class="nav-label">Categorias</div>
            <button class="nav-btn active" id="btn-sw" onclick="setCategory('SOFTWARE')"><i class="fas fa-layer-group"></i> Software Lab</button>
            <button class="nav-btn" id="btn-mk" onclick="setCategory('MARKETING')"><i class="fas fa-rocket"></i> Marketing Toolkit</button>
            <button class="nav-btn" id="btn-in" onclick="setCategory('INSPIRATION')"><i class="fas fa-lightbulb"></i> Mindset & Cultura</button>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title" id="pageTitle">Software Lab</h1>
                
                <div class="user-profile">
                    <div class="user-avatar" id="userInitials">U</div>
                    <div>
                        <div style="font-weight:700; font-size:0.9rem;" id="userDisplayName">Carregando...</div>
                        <div style="font-size:0.75rem; color:#888;">Membro Ativo</div>
                    </div>
                    <button class="btn-logout" onclick="logoutApp()"><i class="fas fa-sign-out-alt"></i> Sair</button>
                </div>
            </div>

            <div class="pills-container" id="pillsContainer"></div>

            <div id="videoGrid" class="video-grid"></div>
        </main>
    </div>

<script>
    // --- 1. LIGAÇÃO AO FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyANzDE9P75ElkvMjShnNTeVQYeeGvfDqxw",
        authDomain: "creativehub-2117d.firebaseapp.com",
        projectId: "creativehub-2117d",
        storageBucket: "creativehub-2117d.firebasestorage.app",
        messagingSenderId: "139416951818",
        appId: "1:139416951818:web:487083c72843b2e78413f3",
        measurementId: "G-0HPC5W1P96"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Proveedor do Google
    const googleProvider = new firebase.auth.GoogleAuthProvider();

    // --- 2. LÓGICA DE LOGIN / REGISTO / PASSWORD ---
    let isLoginMode = true;

    function toggleMode() {
        isLoginMode = !isLoginMode;
        const nameFields = document.querySelectorAll('.only-register');
        const btn = document.getElementById('btn-submit');
        const hint = document.getElementById('toggle-hint');
        const link = document.getElementById('toggle-link');
        const subtitle = document.getElementById('form-subtitle');
        const forgotBtn = document.getElementById('btn-forgot');
        
        document.getElementById('password').required = true;

        if(isLoginMode) {
            nameFields.forEach(el => el.style.display = 'none');
            btn.innerText = "Entrar na App";
            subtitle.innerText = "Acesso exclusivo para membros";
            hint.innerText = "Não tem conta?";
            link.innerText = "Criar Conta";
            forgotBtn.style.display = 'block';
        } else {
            nameFields.forEach(el => el.style.display = 'block');
            btn.innerText = "Registar Agora";
            subtitle.innerText = "Crie a sua conta de aluno";
            hint.innerText = "Já tem uma conta?";
            link.innerText = "Fazer Login";
            forgotBtn.style.display = 'none';
        }
        document.getElementById('msg-box').style.display = 'none';
    }

    function showMessage(msg, isError = false) {
        const box = document.getElementById('msg-box');
        box.innerText = msg;
        box.style.display = 'block';
        box.className = isError ? 'msg-error' : 'msg-success';
    }

    // --- ENTRAR COM GOOGLE ---
    document.getElementById('btn-google').addEventListener('click', async () => {
        try {
            const result = await auth.signInWithPopup(googleProvider);
            const user = result.user;
            
            // Verifica se o user já existe na base de dados (Firestore)
            const userRef = db.collection('users').doc(user.uid);
            const doc = await userRef.get();
            
            if (!doc.exists) {
                // Primeira vez a entrar com o Google - Cria o perfil na BD
                await userRef.set({
                    name: user.displayName || "Utilizador Google",
                    email: user.email,
                    role: "Membro Gratuito",
                    date: new Date().toLocaleDateString(),
                    engagement: "Novo",
                    sessions: 1,
                    status: "Online"
                });
            } else {
                // Já existia - Atualiza as sessões
                await userRef.update({
                    sessions: firebase.firestore.FieldValue.increment(1),
                    status: "Online"
                });
            }
            // O sistema muda de ecrã automaticamente graças ao auth.onAuthStateChanged
        } catch (error) {
            console.error(error);
            showMessage("Erro ao iniciar sessão com o Google. Tente novamente.", true);
        }
    });

    async function resetPassword() {
        const email = document.getElementById('email').value;
        if (!email) return showMessage("Escreva o seu email acima e clique novamente em 'Esqueceu a password?'.", true);
        
        try {
            await auth.sendPasswordResetEmail(email);
            showMessage("Enviámos um link de recuperação para o seu email.", false);
        } catch (error) {
            showMessage("Erro: Verifique se o email está correto ou se tem conta criada.", true);
        }
    }

    document.getElementById('auth-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-submit');
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        btn.disabled = true; btn.innerText = "Aguarde...";
        document.getElementById('msg-box').style.display = 'none';

        try {
            if (isLoginMode) {
                // FAZER LOGIN
                const creds = await auth.signInWithEmailAndPassword(email, password);
                db.collection('users').doc(creds.user.uid).update({ 
                    sessions: firebase.firestore.FieldValue.increment(1), 
                    status: "Online" 
                }).catch(e => console.log("User antigo"));
            } else {
                // FAZER REGISTO
                if(!name) throw new Error("Preencha o seu nome.");
                const creds = await auth.createUserWithEmailAndPassword(email, password);
                
                await db.collection('users').doc(creds.user.uid).set({
                    name: name,
                    email: email,
                    role: "Membro",
                    date: new Date().toLocaleDateString(),
                    engagement: "Novo",
                    sessions: 1,
                    status: "Online"
                });
            }
        } catch (error) {
            let erroPT = "Ocorreu um erro.";
            if(error.code === 'auth/email-already-in-use') erroPT = "Este email já está registado.";
            if(error.code === 'auth/weak-password') erroPT = "A password deve ter 6+ caracteres.";
            if(error.code === 'auth/invalid-credential') erroPT = "Email ou password incorretos.";
            if(error.message === "Preencha o seu nome.") erroPT = error.message;
            
            showMessage(erroPT, true);
            btn.disabled = false;
            btn.innerText = isLoginMode ? "Entrar na App" : "Registar Agora";
        }
    });

    function logoutApp() {
        auth.signOut();
    }

    // --- 3. OBSERVAR SE A PESSOA TEM SESSÃO ---
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            // SESSÃO INICIADA
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'flex';
            
            try {
                const doc = await db.collection('users').doc(user.uid).get();
                if(doc.exists) {
                    const userName = doc.data().name;
                    document.getElementById('userDisplayName').innerText = userName;
                    document.getElementById('userInitials').innerText = userName.charAt(0).toUpperCase();
                } else {
                    document.getElementById('userDisplayName').innerText = user.displayName || "Aluno";
                    document.getElementById('userInitials').innerText = (user.displayName || "U").charAt(0).toUpperCase();
                }
            } catch(e) {}

            setCategory('SOFTWARE'); 
        } else {
            // SEM SESSÃO
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('app-screen').style.display = 'none';
            document.getElementById('btn-submit').disabled = false;
            document.getElementById('btn-submit').innerText = isLoginMode ? "Entrar na App" : "Registar Agora";
        }
    });


    // --- 4. LÓGICA DO CATÁLOGO DE VÍDEOS (Lido do videos.js) ---
    let currentCategory = 'SOFTWARE';
    let currentSubCategory = 'ps';

    function setCategory(catKey) {
        currentCategory = catKey;
        const structure = {
            'SOFTWARE': { title: 'Software Lab', pills: [{id:'ps', label:'Photoshop', icon:'fab fa-adobe'}, {id:'pp', label:'Photopea', icon:'fas fa-leaf'}, {id:'cv', label:'Canva', icon:'fas fa-pen-nib'}] },
            'MARKETING': { title: 'Marketing Toolkit', pills: [{id:'mk', label:'Ferramentas', icon:'fas fa-rocket'}] },
            'INSPIRATION': { title: 'Mindset & Cultura', pills: [{id:'in', label:'Geral', icon:'fas fa-lightbulb'}] }
        };
        currentSubCategory = structure[catKey].pills[0].id;

        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        let navId = catKey === 'SOFTWARE' ? 'btn-sw' : catKey === 'MARKETING' ? 'btn-mk' : 'btn-in';
        document.getElementById(navId).classList.add('active');
        document.getElementById('pageTitle').innerText = structure[catKey].title;
        
        document.getElementById('pillsContainer').innerHTML = structure[catKey].pills.map(p => `
            <button class="pill ${currentSubCategory === p.id ? 'active' : ''}" onclick="setSubCategory('${p.id}')">
                <i class="${p.icon}"></i> <span>${p.label}</span>
            </button>`).join('');

        renderVideoGrid();
    }

    function setSubCategory(subId) {
        currentSubCategory = subId;
        document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
        event.currentTarget.classList.add('active');
        renderVideoGrid();
    }

    function renderVideoGrid() {
        if(typeof tutorialData === 'undefined') {
            document.getElementById('videoGrid').innerHTML = `<div style="grid-column:1/-1;text-align:center;color:#555;">A carregar vídeos...</div>`;
            return;
        }

        const filtered = tutorialData.filter(item => (item.section && item.section.toUpperCase() === currentCategory) && item.program === currentSubCategory);
        const grid = document.getElementById('videoGrid');
        
        if(filtered.length === 0) { 
            grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:50px;color:#555;">Em breve novos conteúdos.</div>`; 
            return; 
        }

        grid.innerHTML = filtered.map((item) => {
            const linkAcao = item.id.includes('http') ? item.id : `https://www.youtube.com/watch?v=${item.id}`;
            const target = item.id.includes('http') ? '_blank' : '_self';

            return `
            <a href="${linkAcao}" target="${target}" class="video-card">
                <div class="thumb-box">
                    <img src="${item.thumb}" loading="lazy" alt="Thumbnail">
                    <div class="play-icon"><i class="fas ${item.id.includes('http') ? 'fa-external-link-alt' : 'fa-play'}"></i></div>
                </div>
                <div class="info-box">
                    <span class="v-tag">${item.tag || 'Geral'}</span>
                    <div class="v-title">${item.title}</div>
                    <div class="v-desc">${item.desc}</div>
                </div>
            </a>`
        }).join('');
    }
</script>
</body>
</html>
